<style>
  html, body { margin: 0; padding: 0; background: #0c1a2b; color: #f1f6fa; font-family: 'Geist', system-ui, sans-serif; scroll-behavior: smooth; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #081320; }
  ::-webkit-scrollbar-thumb { background: rgba(126,220,200,0.25); }
  ::-webkit-scrollbar-thumb:hover { background: rgba(126,220,200,0.4); }

  @keyframes blink { 50% { opacity: 0.4; } }
  @keyframes scanline-shift {
    0% { background-position: 0 0; }
    100% { background-position: 0 4px; }
  }
  @keyframes slot-glow {
    0%, 100% { box-shadow: 0 0 0 1px #7eddc4, 0 0 32px rgba(126,220,200,0.18); }
    50% { box-shadow: 0 0 0 1px #7eddc4, 0 0 48px rgba(126,220,200,0.30); }
  }
  @keyframes arrow-bounce {
    0%, 100% { transform: translateY(-50%) translateX(0); }
    50% { transform: translateY(-50%) translateX(6px); }
  }
  @keyframes loadbar {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fade-up 0.5s ease-out both; }
</style>
